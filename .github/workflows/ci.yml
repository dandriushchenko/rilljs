name: CI

on:
  push:
    branches: [master, gh-pages]
  pull_request:
    branches: [master]

permissions:
  contents: write
  pages: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test with coverage
        run: pnpm run coverage -- --reporter=json-summary --reporter=json

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          # Extract coverage percentage from coverage-summary.json
          COVERAGE=$(node -e "
            const summary = require('./coverage/coverage-summary.json');
            const pct = summary.total.statements.pct;
            console.log(pct);
          ")

          # Determine badge color
          COLOR="red"
          if (( $(echo "$COVERAGE >= 90" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 75" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="yellow"
          elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
            COLOR="orange"
          fi

          # Create the badge JSON for shields.io endpoint
          mkdir -p coverage-badge
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COVERAGE}%\",\"color\":\"${COLOR}\"}" > coverage-badge/coverage.json

      - name: Deploy coverage badge to GitHub Pages
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coverage-badge
          destination_dir: badges
          keep_files: true
